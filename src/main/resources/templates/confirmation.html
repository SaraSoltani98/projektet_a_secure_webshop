<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmed</title>
</head>
<body>
<div layout:fragment="content">
    <div class="confirm-page">

        <div class="confirm-top">
            <h1>Order confirmed!</h1>
            <p>Thank you for your purchase. A confirmation has been sent to your email.</p>
            <p th:text="${order.username}"></p>
            <span class="order-num" th:text="'Order #' + ${order.id}"></span>
        </div>

        <div class="confirm-card">
            <div class="confirm-card-header">Order summary</div>
            <div class="confirm-item" th:each="item : ${order.getOrder()}">
                <div>
                    <p class="confirm-item-name" th:text="${item.productName}"></p>
                    <p class="confirm-item-qty" th:text="'Qty: ' + ${item.quantity}"></p>
                </div>
                <span class="confirm-item-price"
                      th:text="'$ ' + ${#numbers.formatDecimal(item.price * item.quantity, 1, 2)}"></span>
            </div>
            <div class="confirm-totals">
                <div class="confirm-row total">
                    <span>Total</span>
                    <span th:text="'$ ' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}"></span>
                </div>
            </div>
        </div>

        <div class="confirm-actions">
            <a th:href="@{/}" class="btn btn-primary">Continue shopping</a>
        </div>
    </div>
</div>
</body>
</html>
