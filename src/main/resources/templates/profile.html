<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Webshop - Profile</title>
    <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>
<body>
<div layout:fragment="content">
    <div class="profile-page">
        <div class="profile-header">
            <div class="profile-avatar">
                <span th:text="${#strings.substring(email, 0, 1).toUpperCase()}">U</span>
            </div>
            <div>
                <h1>My profile</h1>
                <p th:text="${email}">email@example.com</p>
            </div>
        </div>

        <div class="profile-section">
            <h2>Account details</h2>
            <div class="profile-card">
                <div class="profile-row">
                    <span>Email</span>
                    <span th:text="${email}">email@example.com</span>
                </div>
            </div>
        </div>

        <div class="profile-section">
            <h2>Actions</h2>
            <div class="action-list">
                <form th:action="@{/profile/send-userinfo}" method="post">
                    <button type="submit" class="btn-action">
                        Get my data via email <span class="arrow">→</span>
                    </button>
                </form>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn-action">
                        Log out <span class="arrow">→</span>
                    </button>
                </form>
            </div>
        </div>

        <div class="profile-section">
            <h2>Danger zone</h2>
            <div class="action-list">
                <form th:action="@{/profile/delete}" method="post">
                    <button type="submit" class="btn-action danger">
                        Delete my account <span class="arrow">→</span>
                    </button>
                </form>
            </div>
        </div>

        <p th:if="${error}" th:text="${error}" class="toast toast-error"></p>
        <p th:if="${success}" th:text="${success}" class="toast toast-success"></p>
    </div>
</div>
</body>
</html>
