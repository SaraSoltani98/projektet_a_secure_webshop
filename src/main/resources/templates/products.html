<!DOCTYPE html>
<html lang="en"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div layout:fragment="content">
    <div style="border:1px solid #ccc; padding:10px; margin:10px 0;">
        <h2 th:text="${product.name}">Product name</h2>
        <p><strong>Category:</strong> <span th:text="${product.category}">Category</span></p>
        <p><strong>Price:</strong> <span th:text="${product.price}">0</span> $</p>
        <img th:src="${product.imageUrl}" alt="Product picture" width="200">

        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
            <button type="submit">Lägg i kundvagn</button>
        </form>
    </div>
</div>
</body>
</html>
