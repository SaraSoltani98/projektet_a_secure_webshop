<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h2>Logga in</h2>

<!-- 🔓 Logout message -->
<p th:if="${param.logout}" style="color:green;">
    Du har loggats ut.
</p>

<!-- ❌ Error -->
<p th:if="${error != null}" th:text="${error}" style="color:red;"></p>

<!-- ✅ Mail skickad -->
<p th:if="${message != null}" th:text="${message}" style="color:green;"></p>

<form method="post" th:action="@{/login-request}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <label for="email">Email:</label>
    <input id="email" type="email" name="email" required>
    <br><br>

    <label for="password">Lösenord:</label>
    <input id="password" type="password" name="password" required>
    <br><br>

    <button type="submit">Logga in</button>
</form>

<br>

<a th:href="@{/register}">
    <button type="button">Registrera dig</button>
</a>

</body>
</html>
