<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h2>Logga in</h2>

<form method="post" th:action="@{/login}">
    <label>Email:</label>
    <input type="email" name="username" required>
    <br><br>

    <label>Password:</label>
    <input type="password" name="password" required>
    <br><br>

    <button type="submit">Logga in</button>
</form>

</body>
</html>
