<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Webshop - Register</title>
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>
<section class="form-section">
    <h2>Create Account</h2>

    <p th:if="${error}" class="error-msg" th:text="${error}"></p>

    <form method="post" th:action="@{/register}">
        <div class="form-field">
            <label for="email-field">Email*</label>
            <input id="email-field" type="email" name="email" required>
        </div>

        <div class="form-field">
            <label for="password-field">Password*</label>
            <input id="password-field" type="password" name="password" required>
        </div>

        <div class="form-field">
            <label for="policy-field">
                <input id="policy-field" type="checkbox" name="consent" required>
                * I agree to the terms and conditions
            </label>
        </div>

        <button class="btn btn-primary btn-full" type="submit">Create account</button>
    </form>
</section>
</body>
</html>
