<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sv">
<head>
    <title>Registrera</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Registrera användare</h1>

<p th:if="${param.needRegister}" style="color:blue;">
    Email-adressen är inte registrerad. Du behöver skapa ett konto först.
</p>

<p th:if="${error != null}" th:text="${error}" style="color:red;"></p>

<form method="post" th:action="@{/register}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <label for="email">Email:</label>
    <input id="email" type="email" name="email" th:value="${param.email}" required>
    <br><br>

    <label for="password">Lösenord:</label>
    <input id="password" type="password" name="password" required>
    <br><br>

    <label>
        <input type="checkbox" name="consent">
        Jag godkänner integritetspolicyn
    </label>
    <br><br>

    <button type="submit">Registrera</button>
</form>

<br>

<form th:action="@{/login}" method="get">
    <button type="submit">Tillbaka till login</button>
</form>

</body>
</html>
