name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and install messenger
        run: mvn -f spring-messenger/pom.xml clean install

      - name: Build webshop
        run: mvn -f projektet_a_secure_webshop/pom.xml clean package

  
